    <meta charset="UTF-8">

    <title>擴展性命名練習</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { 
            --blue-main: #0EA5E9;
            --blue-dark: #0369a1;
            --orange-main: #f97316;
            --card-width: 120px;
        }
        body { font-family: "PingFang HK", "Heiti TC", sans-serif; overflow-x: hidden; user-select: none; background: url('images/park.jpg') center/cover fixed; }
        
        /* 3D Button Styles */
        .btn-blue { background-color: var(--blue-main); border-bottom: 5px solid var(--blue-dark); color: white; }
        .btn-orange { background-color: var(--orange-main); border-bottom: 5px solid #c2410c; color: white; }
        .btn-emerald { background-color: #10b981; border-bottom: 5px solid #059669; color: white; }
        .btn-active:active { transform: translateY(2px); border-bottom-width: 2px; }

        /* Vocab Card Logic */
        .vocab-card { width: var(--card-width); flex-shrink: 0; background: white; padding: 10px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
        .selected-card { outline: 6px solid #22c55e; box-shadow: 0 0 20px rgba(34, 197, 94, 0.5); }
        
        /* The Preparation Board (Single Box) */
        .prep-box { background: white; border: 6px solid var(--blue-main); border-radius: 30px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .prep-header { background: var(--blue-main); color: white; padding: 20px; font-size: 2.5rem; font-weight: 900; text-align: center; }

        /* Timer Aesthetics */
        .timer-container { width: 100%; max-width: 800px; position: relative; padding: 20px 0; }
        .timer-track { 
            height: 50px; width: 100%; border-radius: 999px; position: relative; 
            border: 5px solid white; background: rgba(0,0,0,0.1); overflow: visible;
        }
        .timer-fill { height: 100%; border-radius: 999px; transition: width 0.1s linear; }
        .bomb-gradient { background: linear-gradient(to left, #f87171, #facc15); }
        .car-gradient { background: linear-gradient(to right, #60a5fa, #2563eb); }
        
        .mover-emoji { position: absolute; top: -25px; font-size: 70px; z-index: 30; transition: all 0.1s linear; }
        .endpoint-emoji { position: absolute; top: -15px; font-size: 55px; z-index: 10; }

        /* Massive Game Button */
        .big-star-btn {
            width: 220px; height: 220px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fbbf24, #d97706);
            border: 10px solid #92400e; 
            display: flex; align-items: center; justify-content: center;
            font-size: 100px; color: white;
            box-shadow: 0 15px 0 #78350f, 0 20px 40px rgba(0,0,0,0.3);
            cursor: pointer; transition: all 0.1s;
        }
        .big-star-btn:active { transform: translateY(10px); box-shadow: 0 5px 0 #78350f, 0 10px 20px rgba(0,0,0,0.2); }

        /* Summary Grayscale Logic */
        .summary-card { filter: grayscale(100%); opacity: 0.5; cursor: pointer; border: 4px solid transparent; }
        .summary-card.scored { filter: grayscale(0%); opacity: 1; border-color: #22c55e; background: #f0fdf4; transform: scale(1.05); }

        .hide-text p { display: none; }
    </style>
</head>

            const app = document.getElementById('app');
            const hideText = !document.getElementById('textToggle').checked;
            app.className = "mt-20 p-4 " + (hideText ? "hide-text" : "");

            else if (state.view === 'TIMER_SETUP') renderTimerSetup(app);
            else if (state.view === 'GAME') renderGame(app);
            else if (state.view === 'SUMMARY') renderSummary(app);
        }

        function renderSelection(app) {
            app.innerHTML = `
                <div class="max-w-6xl mx-auto">
                    <div class="bg-white/80 p-6 rounded-3xl mb-8 shadow-lg flex flex-wrap gap-4 items-center justify-between border border-white">
                        <input type="text" id="catInput" placeholder="輸入題目 (例如：紅色的水果)" class="flex-1 p-4 border-2 rounded-2xl text-xl font-bold" value="${state.customCategory}" onchange="state.customCategory=this.value">
                        <button onclick="goPrep()" class="px-12 py-4 btn-orange btn-active rounded-full font-black text-2xl">下一步 (${state.selectedItems.length})</button>
                    </div>
                    <div id="grid-root"></div>
                </div>
            `;
            let gridHtml = '';
            categories.forEach(cat => {
                gridHtml += `
                <div class="mb-10">
                    <div class="bg-sky-600 text-white px-8 py-3 rounded-t-3xl text-2xl font-black">${cat}</div>
                    <div class="bg-white/40 p-6 rounded-b-3xl flex flex-wrap gap-6 border-x border-b border-sky-100">
                        ${vocabList.filter(v => v.cat === cat).map(v => `
                            <div onclick="toggleItem('${v.id}')" class="vocab-card cursor-pointer ${state.selectedItems.some(s=>s.id===v.id)?'selected-card':''}">
                                <img src="${v.path}" class="w-full h-auto rounded-lg">
                                <p class="mt-2 font-bold">${v.name}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            });
            document.getElementById('grid-root').innerHTML = gridHtml;
        }

        function renderPrep(app) {
            app.innerHTML = `
                <div class="max-w-5xl mx-auto flex flex-col items-center gap-10">
                    <button onclick="state.view='SELECT';updateView()" class="self-start px-8 py-2 btn-gray btn-active rounded-xl font-bold">← 返回修改</button>
                    <div class="prep-box w-full">
                        <div class="prep-header">${state.customCategory || state.selectedItems[0]?.cat || '命名練習'}</div>
                        <div class="p-10 flex flex-wrap gap-6 justify-center">
                            ${state.selectedItems.map(s => `
                                <div class="vocab-card"><img src="${s.path}" class="w-full"><p class="mt-2 font-bold">${s.name}</p></div>
                            `).join('')}
                        </div>
                    </div>
                    <button onclick="state.view='TIMER_SETUP';updateView()" class="px-24 py-6 btn-orange btn-active rounded-full font-black text-4xl shadow-2xl">準備開始 🚀</button>
                </div>
            `;
        }

        function renderTimerSetup(app) {
            app.innerHTML = `
                <div class="flex flex-col items-center py-10 gap-12">
                    <h2 class="text-5xl font-black text-sky-900">選擇計時器模式</h2>
                    <div class="flex gap-12">
                        <div onclick="state.timerType='bomb';updateView()" class="w-56 h-56 rounded-[40px] cursor-pointer border-8 ${state.timerType==='bomb'?'border-orange-500 bg-orange-50':'border-white bg-white/50'} flex flex-col items-center justify-center transition-all">
                            <span class="text-9xl">💣</span><span class="text-2xl font-black mt-2 text-orange-700">炸彈模式</span>
                        </div>
                        <div onclick="state.timerType='car';updateView()" class="w-56 h-56 rounded-[40px] cursor-pointer border-8 ${state.timerType==='car'?'border-blue-500 bg-blue-50':'border-white bg-white/50'} flex flex-col items-center justify-center transition-all">
                            <span class="text-9xl">🏎️</span><span class="text-2xl font-black mt-2 text-blue-700">賽車模式</span>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        ${[10, 15, 20, 30, 60].map(s => `
                            <button onclick="state.duration=${s};updateView()" class="w-28 py-4 rounded-2xl text-2xl font-bold ${state.duration===s?'btn-orange':'bg-white border-4 border-orange-100'}">${s}秒</button>
                        `).join('')}
                    </div>
                    <button onclick="startGame()" class="px-40 py-8 btn-emerald btn-active rounded-full font-black text-5xl shadow-2xl">GO! 🏁</button>
                </div>
            `;
        }

        function renderGame(app) {
            app.innerHTML = `
                <div class="h-[80vh] flex flex-col items-center justify-between">
                    <div class="w-full max-w-4xl flex flex-col items-center gap-2">
                        <div class="w-full flex justify-between items-end px-4">
                            <span class="text-5xl font-black text-white drop-shadow-md" id="timerText">${state.timeLeft}秒</span>
                            <button onclick="togglePause()" id="pauseBtn" class="px-8 py-2 btn-blue btn-active rounded-full font-black text-xl">暫停 ⏸</button>
                        </div>
                        <div class="timer-container">
                            <div class="endpoint-emoji left-[-15px]">${state.timerType==='bomb'?'🔥':''}</div>
                            <div class="endpoint-emoji right-[-15px]">${state.timerType==='car'?'🏁':''}</div>
                            <div class="timer-track">
                                <div id="tFill" class="timer-fill ${state.timerType==='bomb'?'bomb-gradient':'car-gradient'}" style="width:100%"></div>
                                <div id="tMover" class="mover-emoji" style="${state.timerType==='bomb'?'right:0%':'left:0%'}">${state.timerType==='bomb'?'💣':'🏎️'}</div>
                            </div>
                        </div>
                    </div>

                    <h1 class="text-7xl font-black text-white drop-shadow-lg text-center">${state.customCategory || state.selectedItems[0]?.cat}</h1>

                    <div class="flex flex-col items-center gap-8">
                        <div onclick="tapStar()" class="big-star-btn">⭐</div>
                        <div class="text-9xl font-black text-white drop-shadow-lg" id="liveCounter">0</div>
                    </div>
                    <div class="h-10"></div>
                </div>
            `;
        }

        function renderSummary(app) {
            const finalCatName = state.customCategory || state.selectedItems[0]?.cat || "未命名";
            app.innerHTML = `
                <div id="reportCard" class="bg-white p-12 rounded-[50px] shadow-2xl max-w-6xl mx-auto border-[12px] border-sky-50">
                    <div class="flex justify-between items-center border-b-8 border-sky-50 pb-10 mb-10">
                        <div>
                            <h2 class="text-6xl font-black text-sky-900">${finalCatName}</h2>
                            <p class="text-2xl font-bold text-gray-400 mt-4">練習模式：擴展性命名 | 限時：${state.duration}秒</p>
                        </div>
                        <div class="bg-emerald-50 px-10 py-6 rounded-3xl border-4 border-emerald-100 text-center">
                            <p class="text-2xl font-bold text-emerald-800">已命名</p>
                            <span class="text-8xl font-black text-emerald-600" id="summaryCount">0</span>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-8 justify-center">
                        ${state.selectedItems.map(i => `
                            <div onclick="toggleScore('${i.id}')" id="sum-${i.id}" class="vocab-card summary-card">
                                <img src="${i.path}" class="w-full rounded-lg">
                                <p class="mt-3 text-xl font-bold">${i.name}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="flex justify-center mt-12 mb-20">
                    <button onclick="location.reload()" class="px-20 py-5 btn-blue btn-active rounded-full font-black text-3xl">重新開始</button>
                </div>
            `;
        }

        // --- Core Logic ---

        function toggleItem(id) {
            const idx = state.selectedItems.findIndex(s => s.id === id);
            if(idx > -1) state.selectedItems.splice(idx, 1);
            else state.selectedItems.push(vocabList.find(v => v.id === id));
            updateView();
        }

        function goPrep() {
            if(state.selectedItems.length === 0) return alert('請先選擇圖片');
            state.view = 'PREP'; updateView();
        }

        let timerInt;
        function startGame() {
            state.view = 'GAME';
            state.timeLeft = state.duration;
            state.liveCount = 0;
            state.isPaused = false;
            updateView();
            
            timerInt = setInterval(() => {
                if(state.isPaused) return;
                state.timeLeft -= 0.1;
                if(state.timeLeft <= 0) {
                    clearInterval(timerInt);
                    state.timeLeft = 0;
                    endGame();
                }
                updateTimerUI();
            }, 100);
        }

        function updateTimerUI() {
            const p = (state.timeLeft / state.duration) * 100;
            const fill = document.getElementById('tFill');
            const mover = document.getElementById('tMover');
            const txt = document.getElementById('timerText');
            
            if(!fill || !mover) return;

            txt.innerText = Math.ceil(state.timeLeft) + "秒";

            if(state.timerType === 'bomb') {
                fill.style.width = p + "%";
                mover.style.right = (100 - p) + "%";
            } else {
                fill.style.width = (100 - p) + "%";
                mover.style.left = (100 - p) + "%";
            }
        }

        function togglePause() {
            state.isPaused = !state.isPaused;
            document.getElementById('pauseBtn').innerText = state.isPaused ? "繼續 ▶️" : "暫停 ⏸";
        }

        function tapStar() {
            if(state.isPaused) return;
            state.liveCount++;
            document.getElementById('liveCounter').innerText = state.liveCount;
            sounds.star.currentTime = 0; sounds.star.play();
        }

        function endGame() {
            if(state.timerType === 'bomb') sounds.bomb.play();
            else sounds.win.play();
            
            setTimeout(() => {
                state.view = 'SUMMARY';
                updateView();
            }, 1500);
        }

        function toggleScore(id) {
            const el = document.getElementById(`sum-${id}`);
            const idx = state.scoredIds.indexOf(id);
            if(idx > -1) {
                state.scoredIds.splice(idx, 1);
                el.classList.remove('scored');
            } else {
                state.scoredIds.push(id);
                el.classList.add('scored');
            }
            document.getElementById('summaryCount').innerText = state.scoredIds.length;
        }

        async function exportResult() {
            const target = document.getElementById('reportCard') || document.getElementById('app');
            const canvas = await html2canvas(target, { scale: 2, useCORS: true });
            const link = document.createElement('a');
            link.download = '命名練習紀錄.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        updateView();
    </script>
</body>
</html>
